<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./js/anhive.base.js"></script>
    <title>로그인 - Hive.fw</title>
<style>
    :root { --primary: #164c7e; --primary-dark: #0f3558; --bg: #f4f7fb; --border: #d7e1ea; }
    * { box-sizing: border-box; }
    body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: var(--bg);
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    }
    .login-card {
        width: min(360px, calc(100% - 32px));
        background: #fff; border: 1px solid var(--border); border-radius: 14px;
        box-shadow: 0 16px 40px rgba(15, 53, 88, 0.16); overflow: hidden;
    }
    .login-head {
        padding: 22px; color: #fff; text-align: center;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }
    .login-head h1 { margin: 0; font-size: 20px; }
    .login-head p { margin: 6px 0 0; font-size: 12px; opacity: .85; }
    .login-body { padding: 22px; display: grid; gap: 14px; }
    .field { display: grid; gap: 5px; }
    .field label { font-size: 12px; font-weight: 700; color: #344256; }
    .field input {
        width: 100%; padding: 9px 11px; font-size: 14px; font-family: inherit;
        border: 1px solid #8fb0d4; border-radius: 7px; background: #fff;
        box-shadow: inset 0 1px 2px rgba(15, 40, 70, 0.07);
    }
    .field input:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
    .btn-login {
        margin-top: 4px; padding: 11px; border: none; border-radius: 7px;
        background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
        cursor: pointer;
    }
    .btn-login:hover { filter: brightness(0.96); }
    .err {
        display: none; margin: 0; padding: 9px 11px; border-radius: 7px;
        background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 13px;
    }
    .err.show { display: block; }
</style>
</head>
<body>
    <form class="login-card" onsubmit="do_login(); return false;">
        <div class="login-head">
            <h1>🐝 Hive.fw</h1>
            <p>로그인 후 이용 가능합니다</p>
        </div>
        <div class="login-body">
            <p id="err" class="err"></p>
            <div class="field">
                <label for="userid">아이디</label>
                <input type="text" id="userid" autocomplete="username" autofocus>
            </div>
            <div class="field">
                <label for="password">비밀번호</label>
                <input type="password" id="password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </div>
    </form>

<script>
'use strict';

function getNext() {
    var m = location.search.match(/[?&]next=([^&]*)/);
    var n = m ? decodeURIComponent(m[1]) : '';
    // 오픈 리다이렉트 방지: 같은 디렉터리의 파일명만 허용
    if (!n || /[:/\\]/.test(n) || n.indexOf('..') !== -1) return 'w01_memoctl.html';
    return n;
}

function showErr(msg) {
    var el = document.getElementById('err');
    el.textContent = msg;
    el.classList.add('show');
}

function do_login() {
    var userid = document.getElementById('userid').value.trim();
    var password = document.getElementById('password').value;
    if (!userid || !password) { showErr('아이디와 비밀번호를 입력하세요.'); return; }

    var fd = new FormData();
    fd.append('func', 'login');
    fd.append('userid', userid);
    fd.append('password', password);

    POST('s00_s2service.php', fd,
        function() { location.href = getNext(); },
        function(err) { showErr((err && err.message) ? err.message : '로그인에 실패했습니다.'); }
    );
}
</script>
</body>
</html>
