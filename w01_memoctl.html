<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모 관리 (목록)</title>
<link rel="stylesheet" href="./css/hive_table_lite.css">
<script src="./js/hive_table_lite.js"></script>
<script src="./js/anhive.base.js"></script>
<style>
    :root {
        --primary: #1a4f8a;
        --primary-dark: #0f3360;
        --bg: #f0f4f8;
        --card: #ffffff;
        --border: #ccd6e0;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: var(--bg);
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        font-size: 14px;
    }
    .page-wrap { width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 20px 0 40px; }

    /* 헤더 */
    .page-head {
        padding: 16px 24px;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        border-radius: 12px;
        color: #fff;
        margin-bottom: 16px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .page-head h1 { margin: 0; font-size: 20px; }
    .page-head small { opacity: .75; font-size: 12px; }

    /* 검색/필터 바 */
    .filter-bar {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        margin-bottom: 12px;
    }
    .filter-bar label { font-size: 12px; color: #555; }
    .filter-bar select,
    .filter-bar input[type=text] {
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 5px 9px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
    }
    .filter-bar input[type=text] { width: 200px; }

    /* 버튼 */
    .btn {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 6px 14px; border-radius: 5px; border: none;
        font-size: 13px; font-family: inherit; cursor: pointer;
        transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: #2d7a4f; color: #fff; }
    .btn-outline  { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
    .btn-danger  { background: #c0392b; color: #fff; }
    .btn-sm { padding: 3px 9px; font-size: 12px; }

    /* 액션 바 */
    .action-bar {
        display: flex; gap: 8px; align-items: center;
        margin-bottom: 10px;
    }
    .action-bar .spacer { flex: 1; }
    #total-info { font-size: 12px; color: #666; }

    /* 테이블 래퍼 */
    .tbl-wrap {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: auto;
    }
    #tbl_memo table {
        width: 100%; border: none; margin: 0;
        border-collapse: collapse; font-size: 13px;
    }
    #tbl_memo th {
        background: #e8edf3; color: #333; font-weight: 600;
        padding: 9px 8px; border: 1px solid var(--border);
        white-space: nowrap;
    }
    #tbl_memo td {
        padding: 6px 8px; border: 1px solid #dde5ee;
        vertical-align: middle;
        background: #eef2f7;   /* 읽기전용 기본: 평평한 회색 */
    }
    /* 읽기전용 텍스트 셀: 흐린 글자 */
    #tbl_memo td.data-text:not(.enablewrite) { color: #64748b; }
    #tbl_memo tr:hover td { background: #e7eef6; }

    /* 편집 가능한 텍스트 셀: 흰 입력박스처럼 */
    #tbl_memo td.enablewrite {
        background: #ffffff; color: #111827; cursor: text;
        min-width: 80px;
        box-shadow: inset 0 0 0 1px #8fb0d4;   /* 안쪽 파란 테두리 */
    }
    #tbl_memo td.enablewrite:focus {
        background: #ffffff;
        box-shadow: inset 0 0 0 2px var(--primary);
        outline: none;
    }
    /* 편집 가능한 select(분류): 흰 박스 + 파란 테두리 */
    #tbl_memo td.data-code.enablewrite { background: #ffffff; padding: 2px 4px; }
    #tbl_memo select.cell-select {
        background: #ffffff; border: 1px solid #8fb0d4 !important;
        border-radius: 4px; padding: 3px 4px; cursor: pointer;
    }
    /* 편집 가능한 체크박스 강조 */
    #tbl_memo td.data-check { background: #ffffff; }
    #tbl_memo input.cell-check { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

    /* 셀 내 버튼 */
    #tbl_memo input[type=button] {
        margin: 1px 2px; padding: 3px 9px;
        font-size: 12px; font-family: inherit;
        border-radius: 4px; border: 1px solid #aaa;
        background: #f5f5f5; cursor: pointer;
    }
    #tbl_memo input[type=button]:hover { background: #e0e0e0; }
    #tbl_memo input[value="삭제"] { color: #c0392b; border-color: #e88; }
    #tbl_memo input[value="저장"] { color: #1a5c2f; border-color: #8bc; }

    /* 완료 행 */
    tr.done-row td { opacity: .55; text-decoration: line-through; }

    /* ── 팝업(모달) ── */
    .modal-backdrop {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center; padding: 20px;
        background: rgba(15, 23, 42, 0.46); z-index: 1000;
    }
    .modal-backdrop.is-open { display: flex; }
    .modal-panel {
        width: min(460px, 100%); background: #fff;
        border-radius: 14px; border: 1px solid var(--border);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28); overflow: hidden;
    }
    .modal-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px; color: #fff;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }
    .modal-head h2 { margin: 0; font-size: 17px; }
    .modal-close { background: transparent; border: none; color: #fff; font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 16px 18px; display: grid; gap: 12px; }
    .form-row { display: grid; gap: 5px; }
    .form-row label { font-size: 12px; font-weight: 700; color: #344256; }
    .form-row .label-check { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .form-row input[type=text], .form-row select, .form-row textarea {
        width: 100%; padding: 7px 9px; font-size: 14px; font-family: inherit;
        border: 1px solid #8fb0d4; border-radius: 6px; background: #fff; color: #111827;
        box-shadow: inset 0 1px 2px rgba(15, 40, 70, 0.07);
    }
    .form-row textarea { min-height: 90px; resize: vertical; }
    .form-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .modal-foot {
        display: flex; gap: 8px; padding: 14px 18px;
        border-top: 1px solid var(--border); background: #f8fafc;
    }
    .modal-foot .spacer { flex: 1; }
</style>
</head>
<body>
<div class="page-wrap">

    <!-- 헤더 -->
    <div class="page-head">
        <div>
            <h1>📋 메모 관리</h1>
            <small>Hive.fw 샘플 — 목록 조회 / 추가·수정은 팝업에서</small>
        </div>
        <button class="btn btn-outline" onclick="do_logout()">로그아웃</button>
    </div>

    <!-- 검색 바 -->
    <div class="filter-bar">
        <label>분류</label>
        <select id="sel_category" onchange="load_list()">
            <option value="">전체</option>
            <option value="일반">일반</option>
            <option value="업무">업무</option>
            <option value="개인">개인</option>
        </select>
        <label>검색</label>
        <input type="text" id="inp_keyword" placeholder="제목/내용 검색" onkeydown="if(event.key==='Enter') load_list()">
        <button class="btn btn-primary" onclick="load_list()">🔍 조회</button>
    </div>

    <!-- 액션 바 -->
    <div class="action-bar">
        <button class="btn btn-success" onclick="go_add()">＋ 추가</button>
        <span class="spacer"></span>
        <span id="total-info"></span>
    </div>

    <!-- 테이블 -->
    <div class="tbl-wrap">
        <div id="tbl_memo"></div>
    </div>
</div>

<!-- 메모 추가/수정 팝업 -->
<div id="memoModal" class="modal-backdrop" onclick="if(event.target===this) close_modal()">
    <div class="modal-panel" role="dialog" aria-modal="true">
        <div class="modal-head">
            <h2 id="modalTitle">메모 추가</h2>
            <button type="button" class="modal-close" onclick="close_modal()" aria-label="닫기">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="m_oid">
            <div class="form-row">
                <label for="m_category">분류</label>
                <select id="m_category">
                    <option value="일반">일반</option>
                    <option value="업무">업무</option>
                    <option value="개인">개인</option>
                </select>
            </div>
            <div class="form-row">
                <label for="m_title">제목 *</label>
                <input type="text" id="m_title" placeholder="제목을 입력하세요">
            </div>
            <div class="form-row">
                <label for="m_content">내용</label>
                <textarea id="m_content" placeholder="내용을 입력하세요"></textarea>
            </div>
            <div class="form-row">
                <label class="label-check"><input type="checkbox" id="m_done"> 완료</label>
            </div>
        </div>
        <div class="modal-foot">
            <button type="button" class="btn btn-danger" id="m_delete_btn" onclick="delete_modal()">삭제</button>
            <span class="spacer"></span>
            <button type="button" class="btn btn-outline" onclick="close_modal()">취소</button>
            <button type="button" class="btn btn-success" onclick="save_modal()">저장</button>
        </div>
    </div>
</div>

<script>
'use strict';

/* ── 테이블 정의 ─────────────────────────────────── */
var CATEGORY_CODES = [
    { v: '일반', l: '일반' },
    { v: '업무', l: '업무' },
    { v: '개인', l: '개인' },
];

var tblOption = {
    table: { width: '100%' },
    column: [
        { title: 'OID',  id: 'oid',      type: 'text',    visible: false, role: 'info' },
        { title: '분류',  id: 'category', type: 'code',    visible: true,  role: 'info', codes: CATEGORY_CODES },
        { title: '제목',  id: 'title',    type: 'text',    visible: true,  role: 'info' },
        { title: '내용',  id: 'content',  type: 'text',    visible: true,  role: 'info' },
        { title: '완료',  id: 'done',     type: 'check',   visible: true,  role: 'info' },
        { title: '등록일', id: 'created',  type: 'text',    visible: true,  role: 'info' },
        { title: '관리',  id: '',         type: 'control', visible: true,  role: 'onoff',
            buttons: [
                { value: '수정', onclick: 'edit_row(this);' },
            ]
        },
    ]
};

var memoTable = new TableLite('tbl_memo', tblOption);
memoTable.showControls(true);

/* ── 조회 ────────────────────────────────────────── */
function load_list() {
    var fd = new FormData();
    fd.append('func',     'list_memo');
    fd.append('keyword',  document.getElementById('inp_keyword').value);
    fd.append('category', document.getElementById('sel_category').value);

    POST('s00_s2service.php', fd, function(resp) {
        memoTable.clear();
        var list = resp.data.list || [];
        memoTable.showData(list);
        // 완료 행 스타일
        list.forEach(function(row, i) {
            var trs = memoTable.table.querySelectorAll('tr[data-form="cloned"]');
            if (trs[i] && row.done === '1') trs[i].classList.add('done-row');
        });
        document.getElementById('total-info').textContent = '총 ' + list.length + '건';
    });
}

/* ── 로그아웃 ────────────────────────────────────── */
function do_logout() {
    var fd = new FormData();
    fd.append('func', 'logout');
    POST('s00_s2service.php', fd, function() { location.href = 'w00_login.html'; });
}

/* ── 팝업 열기/닫기 ──────────────────────────────── */
function fill_modal(data) {
    document.getElementById('m_oid').value      = data.oid || '';
    document.getElementById('m_category').value = data.category || '일반';
    document.getElementById('m_title').value    = data.title || '';
    document.getElementById('m_content').value  = data.content || '';
    document.getElementById('m_done').checked   = (data.done === '1');
}

function close_modal() {
    document.getElementById('memoModal').classList.remove('is-open');
}

/* 추가: 빈 팝업 (삭제 버튼 숨김) */
function go_add() {
    fill_modal({});
    document.getElementById('modalTitle').textContent = '메모 추가';
    document.getElementById('m_delete_btn').style.display = 'none';
    document.getElementById('memoModal').classList.add('is-open');
    setTimeout(function() { document.getElementById('m_title').focus(); }, 30);
}

/* 수정: 해당 메모 조회 후 팝업 (삭제 버튼 표시) */
function edit_row(btn) {
    var oid = memoTable.getCellData('oid', btn, 'TR');
    if (!oid) { alert('수정할 메모의 OID를 찾을 수 없습니다.'); return; }

    var fd = new FormData();
    fd.append('func', 'get_memo');
    fd.append('oid',  oid);

    POST('s00_s2service.php', fd, function(resp) {
        if (!resp.data) { alert('메모를 찾을 수 없습니다.'); return; }
        fill_modal(resp.data);
        document.getElementById('modalTitle').textContent = '메모 수정';
        document.getElementById('m_delete_btn').style.display = '';
        document.getElementById('memoModal').classList.add('is-open');
    });
}

/* ── 저장 (INSERT/UPDATE) → 목록 복귀 ────────────── */
function save_modal() {
    var title = document.getElementById('m_title').value.trim();
    if (title === '') { alert('제목을 입력하세요.'); return; }

    var fd = new FormData();
    fd.append('func',     'save_memo');
    fd.append('oid',      document.getElementById('m_oid').value);
    fd.append('category', document.getElementById('m_category').value);
    fd.append('title',    title);
    fd.append('content',  document.getElementById('m_content').value);
    fd.append('done',     document.getElementById('m_done').checked ? '1' : '0');

    POST('s00_s2service.php', fd, function() {
        close_modal();
        load_list();      // 목록 복귀(갱신)
    });
}

/* ── 삭제 → 목록 복귀 ────────────────────────────── */
function delete_modal() {
    var oid = document.getElementById('m_oid').value;
    if (!oid) { alert('삭제할 메모가 없습니다.'); return; }
    if (!confirm('삭제하시겠습니까?')) return;

    var fd = new FormData();
    fd.append('func', 'delete_memo');
    fd.append('oid',  oid);

    POST('s00_s2service.php', fd, function() {
        close_modal();
        load_list();      // 목록 복귀(갱신)
    });
}

/* ESC 로 팝업 닫기 */
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') close_modal();
});

/* ── 초기 로딩 ───────────────────────────────────── */
// CSRF 토큰을 먼저 받아온 뒤 목록 조회 (미로그인 시 로그인 페이지로 자동 이동)
window.addEventListener('DOMContentLoaded', function () {
    initPage(load_list);
});
</script>
</body>
</html>
