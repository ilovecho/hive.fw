<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Grid 기반 메모 입력/관리 화면 -->
    <link rel="stylesheet" href="./css/hive_table_lite.css" type="text/css">
    <link rel="stylesheet" href="./css/hive_grid_lite.css" type="text/css">
    <script src="./js/hive_grid_lite.js"></script>
    <script src="./js/anhive.base.js"></script>

    <title>메모 입력관리 - Grid Form</title>

<style>
    :root {
        --jk-blue: #164c7e;
        --jk-blue-dark: #0f3558;
        --jk-blue-soft: #edf5fb;
        --jk-border: #d7e1ea;
        --jk-text: #1f2937;
        --jk-muted: #6b7280;
        --jk-bg: #f4f7fb;
        --jk-card: #ffffff;
        --jk-danger: #dc2626;
        --jk-ok: #067647;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        color: var(--jk-text);
        background: var(--jk-bg);
        line-height: 1.45;
    }

    .page-wrap {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
    }

    .page-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        color: #fff;
        background: linear-gradient(135deg, var(--jk-blue-dark), var(--jk-blue));
        border-radius: 14px;
        box-shadow: 0 8px 20px rgba(15, 53, 88, 0.18);
    }

    .page-head h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: -0.04em; }
    .page-head p  { margin: 0; font-size: 13px; color: rgba(255,255,255,0.84); }

    .mode-badge {
        min-width: 86px;
        padding: 8px 12px;
        text-align: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--jk-blue-dark);
        background: #fff;
        border-radius: 999px;
    }

    .toolbar {
        margin: 16px 0;
        padding: 14px;
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 10px;
        background: var(--jk-card);
        border: 1px solid var(--jk-border);
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(31, 41, 55, 0.04);
    }

    .search-line { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .search-line label { font-size: 13px; font-weight: 700; color: var(--jk-blue-dark); }
    .search-line input[type="text"] {
        flex: 1 1 220px; min-height: 36px; padding: 8px 10px;
        border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;
    }

    .button-line { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }

    button, input[type="button"] {
        min-height: 36px; padding: 7px 13px;
        border: 1px solid var(--jk-blue); border-radius: 8px;
        background: var(--jk-blue); color: #fff;
        font-size: 13px; font-weight: 700; cursor: pointer;
    }
    button.secondary, input.secondary[type="button"] { color: var(--jk-blue); background: #fff; }
    button.danger,    input.danger[type="button"]    { border-color: var(--jk-danger); background: var(--jk-danger); }
    button:hover, input[type="button"]:hover { filter: brightness(0.96); }

    .card {
        overflow: hidden; background: var(--jk-card);
        border: 1px solid var(--jk-border); border-radius: 12px;
        box-shadow: 0 3px 10px rgba(31, 41, 55, 0.04);
        margin-bottom: 16px;
    }
    .card-title {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; color: var(--jk-blue-dark);
        background: var(--jk-blue-soft); border-bottom: 1px solid var(--jk-border);
        font-size: 15px; font-weight: 800; letter-spacing: -0.03em;
    }
    .card-title small { font-size: 12px; font-weight: 500; color: var(--jk-muted); }

    .grid-box { padding: 12px; }

    /* GridLite 화면 보정 */
    #memo_grid .hive-grid-lite { border: 1px solid #d7e1ea; border-radius: 10px; overflow: hidden; background: #d7e1ea; font-family: inherit; font-size: 13px; }
    #memo_grid .hive-grid-section + .hive-grid-section { border-top: 1px solid #d7e1ea; }
    #memo_grid .hive-grid-section-title { min-height: 36px; color: var(--jk-blue-dark); background: #f1f7fc; border-bottom: 1px solid #d7e1ea; font-size: 14px; }
    #memo_grid .hive-grid { background: #e5edf5; }
    #memo_grid .hive-grid-item { min-height: 38px; background: #fff; }
    #memo_grid .hive-grid-label, #memo_grid .keycolume { justify-content: center; color: #344256; background: #f8fafc; border-right: 1px solid #e2e8f0; font-weight: 700; }
    #memo_grid .hive-grid-cell { min-height: 38px; background: #fff; font-size: 13px; }
    #memo_grid .enablewrite { background: #fffef4; }
    #memo_grid select, #memo_grid input, #memo_grid textarea { font-family: inherit; font-size: 13px; }
    #memo_grid textarea { min-height: 70px !important; width: 100%; border: none; background: transparent; resize: vertical; }
    .col_hide { display: none !important; }

    /* 목록 테이블 */
    .memo-list { width: 100%; border-collapse: collapse; font-size: 13px; }
    .memo-list th { background: #e8edf3; color: #333; padding: 9px 8px; border: 1px solid var(--jk-border); white-space: nowrap; }
    .memo-list td { padding: 7px 8px; border: 1px solid #dde5ee; text-align: center; }
    .memo-list tbody tr { cursor: pointer; }
    .memo-list tbody tr:hover td { background: #f5f8fc; }
    .memo-list .done-y td { opacity: .55; text-decoration: line-through; }
    .memo-list .empty td { color: var(--jk-muted); cursor: default; }

    .msg {
        margin-top: 12px; padding: 10px 12px; border-radius: 8px;
        border: 1px solid #cbd5e1; background: #fff; color: var(--jk-muted);
        font-size: 12px; line-height: 1.5;
    }
    .msg.ok  { border-color: #b7e4c7; background: #f0fdf4; color: var(--jk-ok); }
    .msg.err { border-color: #fecaca; background: #fef2f2; color: var(--jk-danger); }

    @media (max-width: 900px) {
        .page-head { align-items: flex-start; flex-direction: column; }
        .toolbar { grid-template-columns: 1fr; }
        .button-line { justify-content: flex-start; }
        #memo_grid .hive-grid-item { grid-column: span 12 !important; }
    }
</style>
</head>
<body>
<div class="page-wrap">
    <header class="page-head">
        <div>
            <h1>메모 입력관리</h1>
            <p>memo 테이블 기준 메모 등록, 조회, 수정, 삭제를 Grid 폼으로 수행합니다.</p>
        </div>
        <div id="modeBadge" class="mode-badge">신규</div>
    </header>

    <section class="toolbar" aria-label="메모 조회 및 작업 버튼">
        <div class="search-line">
            <label for="searchKeyword">검색어</label>
            <input id="searchKeyword" type="text" placeholder="제목/내용 검색 후 Enter" autocomplete="off">
            <button type="button" onclick="search_list()">조회</button>
        </div>
        <div class="button-line">
            <button type="button" class="secondary" onclick="new_memo()">신규</button>
            <button type="button" onclick="save_memo()">저장</button>
            <button type="button" class="danger" onclick="delete_memo()">삭제</button>
        </div>
    </section>

    <section class="card">
        <div class="card-title">메모 정보 <small>제목은 필수 입력</small></div>
        <div id="memo_grid" class="grid-box"></div>
    </section>

    <section class="card">
        <div class="card-title">메모 목록 <small>행을 클릭하면 위 폼으로 불러옵니다</small></div>
        <div class="grid-box">
            <table class="memo-list">
                <thead>
                    <tr><th style="width:60px">OID</th><th style="width:80px">분류</th><th>제목</th><th style="width:60px">완료</th><th style="width:140px">등록일</th></tr>
                </thead>
                <tbody id="memoListBody"></tbody>
            </table>
        </div>
    </section>

    <div id="msg" class="msg">Grid 기반 메모 입력관리 화면입니다. 목록에서 행을 선택하거나 신규로 입력 후 저장하세요.</div>
</div>

<script>
'use strict';

var API_URL = 's00_s2service.php';
var memoGrid = null;

var CODE_CATEGORY = [
    { v: '일반', l: '일반' },
    { v: '업무', l: '업무' },
    { v: '개인', l: '개인' }
];

var memo_grid_option = {
    table: { width: '100%', columns: 12, label_width: '96px', min_height: '38px', default_span: 4, gap: '1px' },
    sections: [
        {
            title: '메모 내용',
            columns: 12,
            fields: [
                { title: '자료ID', id: 'oid',     type: 'text',     visible: false, role: 'info', span: 3 },
                { title: '분류',   id: 'category', type: 'code',     visible: true,  role: 'edit', codes: CODE_CATEGORY, span: 4 },
                { title: '완료',   id: 'done',     type: 'check',    visible: true,  role: 'edit', span: 4 },
                { title: '등록일', id: 'created',  type: 'text',     visible: true,  role: 'info', span: 4 },
                { title: '제목 *', id: 'title',    type: 'text',     visible: true,  role: 'edit', span: 12 },
                { title: '내용',   id: 'content',  type: 'textarea', visible: true,  role: 'edit', rows: 4, span: 12 }
            ]
        }
    ]
};

function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.className = 'msg ' + (type || '');
    el.textContent = text;
}

function setMode(text) { document.getElementById('modeBadge').textContent = text; }

function init() {
    if (typeof HiveGridLite === 'undefined') {
        showMsg('HiveGridLite 라이브러리를 찾을 수 없습니다. js/hive_grid_lite.js 경로를 확인하세요.', 'err');
        return;
    }
    memoGrid = new HiveGridLite('memo_grid', memo_grid_option);
    new_memo();
    search_list();
}

/* ── 신규 입력 ───────────────────────────────────── */
function new_memo() {
    memoGrid.clear();
    memoGrid.showData({ oid: '', category: '일반', done: '0', created: '', title: '', content: '' });
    setMode('신규');
    showMsg('신규 메모를 입력합니다.');
}

/* ── 저장 (INSERT/UPDATE) ────────────────────────── */
function save_memo() {
    var data = memoGrid.toObject();
    if (!data.title || data.title.trim() === '') {
        showMsg('제목을 입력하세요.', 'err');
        alert('제목을 입력하세요.');
        return;
    }

    var fd = new FormData();
    fd.append('func',     'save_memo');
    fd.append('oid',      data.oid || '');
    fd.append('category', data.category || '일반');
    fd.append('title',    data.title);
    fd.append('content',  data.content || '');
    fd.append('done',     data.done || '0');

    POST(API_URL, fd, function(resp) {
        var newOid = (resp.data && resp.data.oid) ? resp.data.oid : data.oid;
        showMsg((resp.data && resp.data.msg) ? resp.data.msg : '저장되었습니다.', 'ok');
        if (newOid) load_memo(newOid);
        search_list();
    });
}

/* ── 삭제 ────────────────────────────────────────── */
function delete_memo() {
    var oid = memoGrid.getData('oid', '');
    if (!oid) { showMsg('삭제할 메모가 없습니다. 먼저 목록에서 선택하세요.', 'err'); return; }
    if (!confirm('이 메모를 삭제하시겠습니까?')) return;

    var fd = new FormData();
    fd.append('func', 'delete_memo');
    fd.append('oid',  oid);

    POST(API_URL, fd, function() {
        showMsg('삭제되었습니다.', 'ok');
        new_memo();
        search_list();
    });
}

/* ── 단일 조회 → 폼 로딩 ─────────────────────────── */
function load_memo(oid) {
    var fd = new FormData();
    fd.append('func', 'get_memo');
    fd.append('oid',  oid);

    POST(API_URL, fd, function(resp) {
        if (!resp.data) { showMsg('자료가 없습니다.', 'err'); return; }
        memoGrid.clear();
        memoGrid.showData(resp.data);
        setMode('수정');
        showMsg('메모[' + oid + ']를 불러왔습니다.', 'ok');
        document.querySelector('.page-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
}

/* ── 목록 조회 ───────────────────────────────────── */
function search_list() {
    var fd = new FormData();
    fd.append('func',    'list_memo');
    fd.append('keyword', document.getElementById('searchKeyword').value);

    POST(API_URL, fd, function(resp) {
        renderList((resp.data && resp.data.list) ? resp.data.list : []);
    });
}

function renderList(list) {
    var tbody = document.getElementById('memoListBody');
    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

    if (list.length === 0) {
        var tr = document.createElement('tr');
        tr.className = 'empty';
        var td = document.createElement('td');
        td.colSpan = 5;
        td.textContent = '조회된 메모가 없습니다.';
        tr.append(td);
        tbody.append(tr);
        return;
    }

    list.forEach(function(row) {
        var tr = document.createElement('tr');
        if (row.done === '1') tr.className = 'done-y';
        tr.addEventListener('click', function() { load_memo(row.oid); });

        [row.oid, row.category, row.title, (row.done === '1' ? '✔' : ''), row.created].forEach(function(val) {
            var td = document.createElement('td');
            td.textContent = (val === undefined || val === null) ? '' : String(val);
            tr.append(td);
        });
        tbody.append(tr);
    });
}

document.getElementById('searchKeyword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') search_list();
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
