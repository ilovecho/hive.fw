<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Grid 기반 단일 메모 입력 화면 -->
    <link rel="stylesheet" href="./css/hive_table_lite.css" type="text/css">
    <link rel="stylesheet" href="./css/hive_grid_lite.css" type="text/css">
    <script src="./js/hive_grid_lite.js"></script>
    <script src="./js/anhive.base.js"></script>

    <title>메모 입력 - Grid Form</title>

<style>
    :root {
        --jk-blue: #164c7e;
        --jk-blue-dark: #0f3558;
        --jk-blue-soft: #edf5fb;
        --jk-border: #d7e1ea;
        --jk-text: #1f2937;
        --jk-muted: #6b7280;
        --jk-bg: #f4f7fb;
        --jk-card: #ffffff;
        --jk-danger: #dc2626;
        --jk-ok: #067647;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        color: var(--jk-text);
        background: var(--jk-bg);
        line-height: 1.45;
    }

    .page-wrap {
        width: min(820px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
    }

    .page-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        color: #fff;
        background: linear-gradient(135deg, var(--jk-blue-dark), var(--jk-blue));
        border-radius: 14px;
        box-shadow: 0 8px 20px rgba(15, 53, 88, 0.18);
    }

    .page-head h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: -0.04em; }
    .page-head p  { margin: 0; font-size: 13px; color: rgba(255,255,255,0.84); }

    .mode-badge {
        min-width: 86px;
        padding: 8px 12px;
        text-align: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--jk-blue-dark);
        background: #fff;
        border-radius: 999px;
    }

    .toolbar {
        margin: 16px 0;
        padding: 14px;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 10px;
        background: var(--jk-card);
        border: 1px solid var(--jk-border);
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(31, 41, 55, 0.04);
    }

    .search-line { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .search-line label { font-size: 13px; font-weight: 700; color: var(--jk-blue-dark); }
    .search-line input[type="text"] {
        flex: 1 1 160px; min-height: 36px; padding: 8px 10px;
        border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;
    }

    .button-line { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }

    button, input[type="button"] {
        min-height: 36px; padding: 7px 13px;
        border: 1px solid var(--jk-blue); border-radius: 8px;
        background: var(--jk-blue); color: #fff;
        font-size: 13px; font-weight: 700; cursor: pointer;
    }
    button.secondary, input.secondary[type="button"] { color: var(--jk-blue); background: #fff; }
    button.danger,    input.danger[type="button"]    { border-color: var(--jk-danger); background: var(--jk-danger); }
    button:hover, input[type="button"]:hover { filter: brightness(0.96); }

    .card {
        overflow: hidden; background: var(--jk-card);
        border: 1px solid var(--jk-border); border-radius: 12px;
        box-shadow: 0 3px 10px rgba(31, 41, 55, 0.04);
    }
    .card-title {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; color: var(--jk-blue-dark);
        background: var(--jk-blue-soft); border-bottom: 1px solid var(--jk-border);
        font-size: 15px; font-weight: 800; letter-spacing: -0.03em;
    }
    .card-title small { font-size: 12px; font-weight: 500; color: var(--jk-muted); }

    .grid-box { padding: 12px; }

    /* GridLite 화면 보정 */
    #memo_grid .hive-grid-lite { border: 1px solid #d7e1ea; border-radius: 10px; overflow: hidden; background: #d7e1ea; font-family: inherit; font-size: 13px; }
    #memo_grid .hive-grid-section + .hive-grid-section { border-top: 1px solid #d7e1ea; }
    #memo_grid .hive-grid-section-title { min-height: 36px; color: var(--jk-blue-dark); background: #f1f7fc; border-bottom: 1px solid #d7e1ea; font-size: 14px; }
    #memo_grid .hive-grid { background: #d7e1ea; }
    #memo_grid .hive-grid-item { min-height: 42px; background: #eef2f7; }
    #memo_grid .hive-grid-label, #memo_grid .keycolume { justify-content: center; color: #344256; background: #e3ebf4; border-right: 1px solid #cdd9e6; font-weight: 700; }
    #memo_grid .hive-grid-cell { min-height: 42px; background: transparent; font-size: 13px; }

    /* 읽기전용 텍스트: 평평한 배경 + 흐린 글자 (입력칸처럼 보이지 않게) */
    #memo_grid .hive-grid-cell.data-text { color: #64748b; background: transparent; }

    /* 편집 가능한 텍스트 셀: 흰 입력박스 + 파란 테두리 */
    #memo_grid .data-text.enablewrite[contenteditable="true"] {
        background: #ffffff; color: #111827;
        border: 1px solid #8fb0d4; border-radius: 5px;
        box-shadow: inset 0 1px 2px rgba(15, 40, 70, 0.07);
        margin: 5px; padding: 6px 8px; min-height: 26px; cursor: text;
    }
    #memo_grid .data-text.enablewrite[contenteditable="true"]:focus {
        border-color: #2563eb; outline: 2px solid #2563eb; outline-offset: -1px;
    }

    /* select / textarea 입력: 흰 박스 + 파란 테두리 */
    #memo_grid select, #memo_grid input, #memo_grid textarea {
        font-family: inherit; font-size: 13px;
        background: #ffffff; color: #111827;
        border: 1px solid #8fb0d4; border-radius: 5px;
        box-shadow: inset 0 1px 2px rgba(15, 40, 70, 0.07);
    }
    #memo_grid select:disabled, #memo_grid input:disabled, #memo_grid textarea:disabled {
        background: #e9edf2; color: #6b7280; border-color: #cbd5e1; box-shadow: none;
    }
    #memo_grid .data-code, #memo_grid .data-input { padding: 4px; }
    #memo_grid textarea { min-height: 90px !important; width: 100%; resize: vertical; }
    .col_hide { display: none !important; }

    .msg {
        margin-top: 12px; padding: 10px 12px; border-radius: 8px;
        border: 1px solid #cbd5e1; background: #fff; color: var(--jk-muted);
        font-size: 12px; line-height: 1.5;
    }
    .msg.ok  { border-color: #b7e4c7; background: #f0fdf4; color: var(--jk-ok); }
    .msg.err { border-color: #fecaca; background: #fef2f2; color: var(--jk-danger); }

    @media (max-width: 720px) {
        .page-head { align-items: flex-start; flex-direction: column; }
        .toolbar { grid-template-columns: 1fr; }
        .button-line { justify-content: flex-start; }
        #memo_grid .hive-grid-item { grid-column: span 12 !important; }
    }
</style>
</head>
<body>
<div class="page-wrap">
    <header class="page-head">
        <div>
            <h1>메모 입력</h1>
            <p>memo 한 건을 입력/수정합니다. OID로 기존 메모를 불러올 수 있습니다.</p>
        </div>
        <div id="modeBadge" class="mode-badge">신규</div>
    </header>

    <section class="toolbar" aria-label="메모 불러오기 및 작업 버튼">
        <div class="search-line">
            <label for="loadOid">OID</label>
            <input id="loadOid" type="text" inputmode="numeric" placeholder="불러올 메모 OID 입력 후 Enter" autocomplete="off">
            <button type="button" onclick="load_by_input()">불러오기</button>
        </div>
        <div class="button-line">
            <button type="button" class="secondary" onclick="go_list()">≡ 목록</button>
            <button type="button" class="secondary" onclick="new_memo()">신규</button>
            <button type="button" onclick="save_memo()">저장</button>
            <button type="button" class="danger" onclick="delete_memo()">삭제</button>
        </div>
    </section>

    <section class="card">
        <div class="card-title">메모 정보 <small>제목은 필수 입력</small></div>
        <div id="memo_grid" class="grid-box"></div>
    </section>

    <div id="msg" class="msg">새 메모를 입력하거나, 상단에 OID를 입력해 기존 메모를 불러와 수정하세요.</div>
</div>

<script>
'use strict';

var API_URL = 's00_s2service.php';
var memoGrid = null;

var CODE_CATEGORY = [
    { v: '일반', l: '일반' },
    { v: '업무', l: '업무' },
    { v: '개인', l: '개인' }
];

var memo_grid_option = {
    table: { width: '100%', columns: 12, label_width: '96px', min_height: '38px', default_span: 4, gap: '1px' },
    sections: [
        {
            title: '메모 내용',
            columns: 12,
            fields: [
                { title: '자료ID', id: 'oid',     type: 'text',     visible: false, role: 'info', span: 3 },
                { title: '분류',   id: 'category', type: 'code',     visible: true,  role: 'edit', codes: CODE_CATEGORY, span: 4 },
                { title: '완료',   id: 'done',     type: 'check',    visible: true,  role: 'edit', span: 4 },
                { title: '등록일', id: 'created',  type: 'text',     visible: true,  role: 'info', span: 4 },
                { title: '제목 *', id: 'title',    type: 'text',     visible: true,  role: 'edit', span: 12 },
                { title: '내용',   id: 'content',  type: 'textarea', visible: true,  role: 'edit', rows: 5, span: 12 }
            ]
        }
    ]
};

function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.className = 'msg ' + (type || '');
    el.textContent = text;
}

function setMode(text) { document.getElementById('modeBadge').textContent = text; }

/* ── 목록(memoctl)으로 이동 ──────────────────────── */
function go_list() { window.location.href = 'w01_memoctl.html'; }

function getQueryParam(name) {
    var m = document.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
}

function init() {
    if (typeof HiveGridLite === 'undefined') {
        showMsg('HiveGridLite 라이브러리를 찾을 수 없습니다. js/hive_grid_lite.js 경로를 확인하세요.', 'err');
        return;
    }
    memoGrid = new HiveGridLite('memo_grid', memo_grid_option);
    new_memo();

    // 목록(memoctl)에서 ?oid= 로 호출된 경우 해당 메모를 불러와 수정 모드
    var oid = getQueryParam('oid');
    if (oid) {
        document.getElementById('loadOid').value = oid;
        load_memo(oid);
    }
}

/* ── 신규 입력 ───────────────────────────────────── */
function new_memo() {
    memoGrid.clear();
    memoGrid.showData({ oid: '', category: '일반', done: '0', created: '', title: '', content: '' });
    document.getElementById('loadOid').value = '';
    setMode('신규');
    showMsg('새 메모를 입력합니다.');
}

/* ── 저장 (INSERT/UPDATE) ────────────────────────── */
function save_memo() {
    var data = memoGrid.toObject();
    if (!data.title || data.title.trim() === '') {
        showMsg('제목을 입력하세요.', 'err');
        alert('제목을 입력하세요.');
        return;
    }

    var fd = new FormData();
    fd.append('func',     'save_memo');
    fd.append('oid',      data.oid || '');
    fd.append('category', data.category || '일반');
    fd.append('title',    data.title);
    fd.append('content',  data.content || '');
    fd.append('done',     data.done || '0');

    POST(API_URL, fd, function(resp) {
        var newOid = (resp.data && resp.data.oid) ? resp.data.oid : data.oid;
        showMsg((resp.data && resp.data.msg) ? resp.data.msg : '저장되었습니다.', 'ok');
        if (newOid) load_memo(newOid);
    });
}

/* ── 삭제 ────────────────────────────────────────── */
function delete_memo() {
    var oid = memoGrid.getData('oid', '');
    if (!oid) { showMsg('삭제할 메모가 없습니다. 먼저 불러오세요.', 'err'); return; }
    if (!confirm('이 메모를 삭제하시겠습니까?')) return;

    var fd = new FormData();
    fd.append('func', 'delete_memo');
    fd.append('oid',  oid);

    POST(API_URL, fd, function() {
        showMsg('삭제되었습니다.', 'ok');
        new_memo();
    });
}

/* ── 단일 조회 → 폼 로딩 ─────────────────────────── */
function load_by_input() {
    var oid = document.getElementById('loadOid').value.trim();
    if (!oid) { alert('불러올 OID를 입력하세요.'); return; }
    load_memo(oid);
}

function load_memo(oid) {
    var fd = new FormData();
    fd.append('func', 'get_memo');
    fd.append('oid',  oid);

    POST(API_URL, fd, function(resp) {
        if (!resp.data) { showMsg('OID[' + oid + '] 자료가 없습니다.', 'err'); return; }
        memoGrid.clear();
        memoGrid.showData(resp.data);
        document.getElementById('loadOid').value = resp.data.oid;
        setMode('수정');
        showMsg('메모[' + oid + ']를 불러왔습니다.', 'ok');
    });
}

document.getElementById('loadOid').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') load_by_input();
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
