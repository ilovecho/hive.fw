<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모 조회</title>
<link rel="stylesheet" href="./css/hive_table_lite.css">
<link rel="stylesheet" href="./css/hive_attach.css">
<script src="./js/hive_table_lite.js"></script>
<script src="./js/anhive.base.js"></script>
<style>
    :root {
        --primary: #1a4f8a;
        --primary-dark: #0f3360;
        --bg: #f0f4f8;
        --card: #ffffff;
        --border: #ccd6e0;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: var(--bg);
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        font-size: 14px;
    }
    .page-wrap { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 20px 0 40px; }

    .page-head {
        padding: 16px 24px;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        border-radius: 12px; color: #fff; margin-bottom: 16px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .page-head h1 { margin: 0; font-size: 20px; }
    .page-head small { opacity: .75; font-size: 12px; }

    .filter-bar {
        background: var(--card); border: 1px solid var(--border); border-radius: 8px;
        padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        margin-bottom: 12px;
    }
    .filter-bar label { font-size: 12px; color: #555; }
    .filter-bar select, .filter-bar input[type=text] {
        border: 1px solid var(--border); border-radius: 5px; padding: 5px 9px;
        font-size: 13px; font-family: inherit; outline: none;
    }
    .filter-bar input[type=text] { width: 220px; }

    .btn {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 6px 14px; border-radius: 5px; border: none;
        font-size: 13px; font-family: inherit; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }

    .info-bar { display: flex; align-items: center; margin-bottom: 10px; }
    .info-bar .spacer { flex: 1; }
    #total-info { font-size: 12px; color: #666; }

    .tbl-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: auto; }
    #tbl_memo table { width: 100%; border: none; margin: 0; border-collapse: collapse; font-size: 13px; }
    #tbl_memo th {
        background: #e8edf3; color: #333; font-weight: 600;
        padding: 9px 8px; border: 1px solid var(--border); white-space: nowrap;
    }
    #tbl_memo td { padding: 8px; border: 1px solid #dde5ee; background: #fff; vertical-align: middle; }
    #tbl_memo tbody tr { cursor: pointer; }
    #tbl_memo tr:hover td { background: #eef4fb; }
    tr.done-row td { opacity: .55; text-decoration: line-through; }

    /* 읽기전용 상세 팝업 */
    .modal-backdrop {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center; padding: 20px;
        background: rgba(15, 23, 42, 0.46); z-index: 1000;
    }
    .modal-backdrop.is-open { display: flex; }
    .modal-panel {
        width: min(520px, 100%); background: #fff; border-radius: 14px;
        border: 1px solid var(--border); box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28); overflow: hidden;
    }
    .modal-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px; color: #fff;
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }
    .modal-head h2 { margin: 0; font-size: 17px; word-break: break-all; }
    .modal-close { background: transparent; border: none; color: #fff; font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 16px 18px; display: grid; gap: 12px; }
    .view-row { display: flex; gap: 10px; align-items: baseline; font-size: 14px; }
    .view-label { flex: 0 0 64px; font-size: 12px; font-weight: 700; color: #344256; }
    .view-block { display: grid; gap: 6px; }
    .view-content {
        white-space: pre-wrap; word-break: break-word;
        padding: 10px 12px; background: #f4f7fb; border: 1px solid var(--border);
        border-radius: 6px; min-height: 60px; font-size: 14px; line-height: 1.5;
    }
    .modal-foot { display: flex; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--border); background: #f8fafc; }
    .modal-foot .spacer { flex: 1; }
</style>
</head>
<body>
<div class="page-wrap">

    <!-- 헤더 -->
    <div class="page-head">
        <div>
            <h1>📖 메모 조회</h1>
            <small>Hive.fw — 읽기 전용 (행을 클릭하면 상세 보기)</small>
        </div>
        <button class="btn btn-outline" onclick="do_logout()">로그아웃</button>
    </div>

    <!-- 검색 바 -->
    <div class="filter-bar">
        <label>분류</label>
        <select id="sel_category" onchange="load_list()">
            <option value="">전체</option>
            <option value="일반">일반</option>
            <option value="업무">업무</option>
            <option value="개인">개인</option>
        </select>
        <label>검색</label>
        <input type="text" id="inp_keyword" placeholder="제목/내용 검색" onkeydown="if(event.key==='Enter') load_list()">
        <button class="btn btn-primary" onclick="load_list()">🔍 조회</button>
    </div>

    <div class="info-bar">
        <span class="spacer"></span>
        <span id="total-info"></span>
    </div>

    <!-- 목록 -->
    <div class="tbl-wrap">
        <div id="tbl_memo"></div>
    </div>
</div>

<!-- 읽기전용 상세 팝업 -->
<div id="viewModal" class="modal-backdrop" onclick="if(event.target===this) close_view()">
    <div class="modal-panel" role="dialog" aria-modal="true">
        <div class="modal-head">
            <h2 id="v_title">메모</h2>
            <button type="button" class="modal-close" onclick="close_view()" aria-label="닫기">×</button>
        </div>
        <div class="modal-body">
            <div class="view-row"><span class="view-label">분류</span><span id="v_category"></span></div>
            <div class="view-row"><span class="view-label">완료</span><span id="v_done"></span></div>
            <div class="view-row"><span class="view-label">등록일</span><span id="v_created"></span></div>
            <div class="view-block"><span class="view-label">내용</span><div id="v_content" class="view-content"></div></div>
            <div class="view-block"><span class="view-label">첨부파일</span><div id="v_attach" class="attach-list"></div></div>
        </div>
        <div class="modal-foot">
            <span class="spacer"></span>
            <button type="button" class="btn btn-outline" onclick="close_view()">닫기</button>
        </div>
    </div>
</div>

<script>
'use strict';

var CATEGORY_CODES = [
    { v: '일반', l: '일반' },
    { v: '업무', l: '업무' },
    { v: '개인', l: '개인' },
];

/* 읽기 전용 목록: 모든 컬럼 role:info, 관리(수정/삭제) 컬럼 없음 */
var tblOption = {
    table: { width: '100%' },
    column: [
        { title: 'OID',  id: 'oid',      type: 'text',  visible: false, role: 'info' },
        { title: '분류',  id: 'category', type: 'code',  visible: true,  role: 'info', codes: CATEGORY_CODES },
        { title: '제목',  id: 'title',    type: 'text',  visible: true,  role: 'info' },
        { title: '내용',  id: 'content',  type: 'text',  visible: true,  role: 'info' },
        { title: '완료',  id: 'done',     type: 'check', visible: true,  role: 'info' },
        { title: '등록일', id: 'created',  type: 'text',  visible: true,  role: 'info' },
    ]
};

var memoTable = new TableLite('tbl_memo', tblOption);

/* ── 목록 조회 ───────────────────────────────────── */
function load_list() {
    var fd = new FormData();
    fd.append('func',     'list_memo');
    fd.append('keyword',  document.getElementById('inp_keyword').value);
    fd.append('category', document.getElementById('sel_category').value);

    POST('s00_s2service.php', fd, function(resp) {
        memoTable.clear();
        var list = (resp.data && resp.data.list) ? resp.data.list : [];
        memoTable.showData(list);

        // 행 클릭 → 상세 보기, 완료행 스타일
        var trs = memoTable.table.querySelectorAll('tr[data-form="cloned"]');
        list.forEach(function(row, i) {
            if (!trs[i]) return;
            if (row.done === '1') trs[i].classList.add('done-row');
            (function(oid) {
                trs[i].addEventListener('click', function() { open_view(oid); });
            })(row.oid);
        });
        document.getElementById('total-info').textContent = '총 ' + list.length + '건';
    });
}

/* ── 상세 보기 (읽기 전용) ───────────────────────── */
function open_view(oid) {
    var fd = new FormData();
    fd.append('func', 'get_memo');
    fd.append('oid',  oid);

    POST('s00_s2service.php', fd, function(resp) {
        var m = resp.data;
        if (!m) { alert('메모를 찾을 수 없습니다.'); return; }

        document.getElementById('v_title').textContent    = m.title || '(제목 없음)';
        document.getElementById('v_category').textContent = m.category || '';
        document.getElementById('v_done').textContent     = (m.done === '1') ? '완료' : '미완료';
        document.getElementById('v_created').textContent  = m.created || '';
        document.getElementById('v_content').textContent  = m.content || '';

        load_view_attach(oid);
        document.getElementById('viewModal').classList.add('is-open');
    });
}

/* 첨부 목록 (다운로드만, 삭제/업로드 없음) */
function load_view_attach(oid) {
    var box = document.getElementById('v_attach');
    while (box.firstChild) box.removeChild(box.firstChild);

    var fd = new FormData();
    fd.append('func', 'list_attach');
    fd.append('memo_id', oid);

    POST('s00_s2service.php', fd, function(resp) {
        var items = resp.data || [];
        if (!items.length) {
            var empty = document.createElement('div');
            empty.className = 'attach-empty';
            empty.textContent = '첨부파일 없음';
            box.appendChild(empty);
            return;
        }
        items.forEach(function(it) {
            var row = document.createElement('div');
            row.className = 'attach-item';

            var link = document.createElement('a');
            link.className = 'attach-name';
            link.href = 'download.php?att=' + encodeURIComponent(it.att_id);
            link.textContent = it.filename;          // XSS 안전
            link.setAttribute('download', '');

            var size = document.createElement('span');
            size.className = 'attach-size';
            var n = parseInt(it.sizeof, 10) || 0;
            size.textContent = (n < 1024) ? (n + ' B')
                             : (n < 1048576) ? ((n / 1024).toFixed(1) + ' KB')
                             : ((n / 1048576).toFixed(1) + ' MB');

            row.appendChild(link);
            row.appendChild(size);
            box.appendChild(row);
        });
    });
}

function close_view() {
    document.getElementById('viewModal').classList.remove('is-open');
}

/* ── 로그아웃 ────────────────────────────────────── */
function do_logout() {
    var fd = new FormData();
    fd.append('func', 'logout');
    POST('s00_s2service.php', fd, function() { location.href = 'w00_login.html'; });
}

/* ESC 로 팝업 닫기 */
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') close_view();
});

/* ── 초기 로딩 ───────────────────────────────────── */
// CSRF 토큰을 먼저 받아온 뒤 목록 조회 (미로그인 시 로그인 페이지로 자동 이동)
window.addEventListener('DOMContentLoaded', function () {
    initPage(load_list);
});
</script>
</body>
</html>
